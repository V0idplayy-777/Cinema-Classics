<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Classics</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #111; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header {
            background-color: #000; padding: 20px; text-align: center; border-bottom: 2px solid #333;
        }
        main { display: flex; flex: 1; overflow: hidden; }
        .player-container {
            flex: 2; background-color: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
        }
        .sidebar {
            flex: 1; overflow-y: auto; padding: 20px; background-color: #181818;
        }
        iframe {
            width: 100%; max-width: 100%; height: 85%; border: none; background: #000;
        }
        #movie-title {
            margin-top: 15px; font-size: 1.5rem; color: #e50914; text-align: center;
        }
        .movie-card {
            background-color: #222; border-radius: 6px; padding: 15px; margin-bottom: 15px;
            cursor: pointer; transition: all 0.2s; border: 1px solid #333;
        }
        .movie-card:hover, .movie-card.active {
            background-color: #333; border-color: #e50914;
        }
    </style>
</head>
<body>

    <header>
        <h1>Cinema Classics</h1>
    </header>

    <main>
        <!-- Player -->
        <div class="player-container">
            <iframe id="main-player" 
                    src="https://archive.org/embed/sherlock.-jr..-1924.1080p.-blu-ray.x-264-yts.-am" 
                    width="560" height="384" 
                    frameborder="0" 
                    webkitallowfullscreen="true" 
                    mozallowfullscreen="true" 
                    allowfullscreen>
            </iframe>
            <h2 id="movie-title">Sherlock Jr. (1924)</h2>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>Available Movies</h2>
            <div class="movie-card active" onclick="switchMovie(this)">
                <h3>Sherlock Jr. (1924)</h3>
                <div style="font-size:0.9rem; color:#aaa;">Buster Keaton • Silent Comedy • G</div>
            </div>
        </div>
    </main>

    <script>
        function switchMovie(el) {
            document.querySelectorAll('.movie-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            
            // For now we only have one movie
            document.getElementById('movie-title').textContent = "Sherlock Jr. (1924)";
        }
    </script>
</body>
</html>
