<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Domain Movie Streamer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #333;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .player-container {
            flex: 2;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-right: 2px solid #333;
        }

        video {
            width: 100%;
            max-height: 80%;
            background-color: #000;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        #movie-title {
            margin-top: 15px;
            font-size: 1.4rem;
            text-align: center;
            color: #e50914;
        }

        .sidebar {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #181818;
        }

        .sidebar h2 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .movie-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .movie-card {
            background-color: #222;
            border-radius: 6px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid #333;
        }

        .movie-card:hover {
            transform: translateY(-2px);
            background-color: #333;
            border-color: #e50914;
        }

        .movie-card.active {
            border-color: #e50914;
            background-color: #2a1111;
        }

        .movie-card h3 {
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .movie-meta {
            font-size: 0.8rem;
            color: #aaa;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>Cinema Classics</h1>
    </header>

    <main>
        <div class="player-container">
            <video id="video-player" controls autoplay>
                Your browser does not support the video tag.
            </video>
            <h2 id="movie-title">Select a movie from the list to start watching</h2>
        </div>

        <div class="sidebar">
            <h2>Feature Films</h2>
            <div id="loading" class="loading">Loading public domain catalog...</div>
            <div id="movie-list" class="movie-list"></div>
        </div>
    </main>

    <script>
const videoPlayer = document.getElementById('video-player');
const movieTitle = document.getElementById('movie-title');
const movieListContainer = document.getElementById('movie-list');
const loadingElement = document.getElementById('loading');

async function fetchMovies() {
    loadingElement.innerText = "Contacting archive.org...";

    try {
        const searchQuery = 'mediatype:movies AND collection:opensource_movies';
        const apiUrl = `https://archive.org/advancedsearch.php?q=${encodeURIComponent(searchQuery)}&output=json&rows=20`;

        // Try multiple proxies
        const proxies = [
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(apiUrl)}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`
        ];

        let data = null;
        for (let proxyUrl of proxies) {
            try {
                console.log("Trying:", proxyUrl);
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 20000);

                const response = await fetch(proxyUrl, { signal: controller.signal });
                clearTimeout(timeout);

                if (response.ok) {
                    const text = await response.text();
                    data = JSON.parse(text);
                    console.log("Success with proxy");
                    break;
                }
            } catch (e) {
                console.warn("Proxy failed, trying next...");
            }
        }

        if (!data || !data.response || !data.response.docs) {
            throw new Error("Could not get movie data");
        }

        loadingElement.style.display = 'none';
        displayMovies(data.response.docs);

    } catch (error) {
        console.error("Error:", error);
        loadingElement.innerHTML = `Failed to load from archive.org.<br><small>${error.message}</small>`;
    }
}

function displayMovies(movies) {
    movieListContainer.innerHTML = '';

    movies.forEach(movie => {
        if (!movie.title || !movie.identifier) return;

        const card = document.createElement('div');
        card.className = 'movie-card';
        
        card.innerHTML = `
            <h3>${movie.title}</h3>
            <div class="movie-meta">
                ${movie.creator ? `By: ${movie.creator}<br>` : ''}
                ${movie.date ? `Year: ${movie.date}` : 'Public Domain'}
            </div>
        `;

        card.addEventListener('click', () => {
            document.querySelectorAll('.movie-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            playMovie(movie.identifier, movie.title);
        });

        movieListContainer.appendChild(card);
    });
}

function playMovie(identifier, title) {
    movieTitle.innerText = title || identifier;
    const streamUrl = `https://archive.org/download/${identifier}/${identifier}.mp4`;
    
    videoPlayer.src = streamUrl;
    videoPlayer.load();
    videoPlayer.play().catch(err => {
        console.warn("Play error (click play manually):", err);
    });
}

// Start
fetchMovies();
    </script>
</body>
</html>
