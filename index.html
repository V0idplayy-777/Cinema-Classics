<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Domain Movie Streamer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #111; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { background-color: #000; padding: 20px; text-align: center; border-bottom: 2px solid #333; }
        main { display: flex; flex: 1; overflow: hidden; }
        .player-container {
            flex: 2; background-color: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; border-right: 2px solid #333;
        }
        video { width: 100%; max-height: 80%; background: #000; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        #movie-title { margin-top: 15px; font-size: 1.4rem; color: #e50914; }
        .sidebar { flex: 1; overflow-y: auto; padding: 20px; background-color: #181818; }
        .sidebar h2 { margin-bottom: 15px; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .movie-list { display: flex; flex-direction: column; gap: 15px; }
        .movie-card {
            background-color: #222; border-radius: 6px; padding: 15px; cursor: pointer;
            transition: all 0.2s; border: 1px solid #333;
        }
        .movie-card:hover { transform: translateY(-2px); background-color: #333; border-color: #e50914; }
        .movie-card.active { border-color: #e50914; background-color: #2a1111; }
        .movie-meta { font-size: 0.8rem; color: #aaa; }
        .loading { text-align: center; padding: 40px; color: #aaa; font-style: italic; }
    </style>
</head>
<body>

<header><h1>Cinema Classics</h1></header>

<main>
    <div class="player-container">
        <video id="video-player" controls></video>
        <h2 id="movie-title">Select a movie from the list</h2>
    </div>
    <div class="sidebar">
        <h2>Feature Films</h2>
        <div id="loading" class="loading">Loading...</div>
        <div id="movie-list" class="movie-list"></div>
    </div>
</main>

<script>
const videoPlayer = document.getElementById('video-player');
const movieTitleEl = document.getElementById('movie-title');
const movieList = document.getElementById('movie-list');
const loading = document.getElementById('loading');

const movies = [
    { title: "Night of the Living Dead (1968)", id: "nightofthelivingdead", year: 1968 },
    { title: "Plan 9 from Outer Space (1959)", id: "Plan9fromOuterSpace", year: 1959 },
    { title: "The Little Shop of Horrors (1960)", id: "littleshopofhorrors", year: 1960 },
    { title: "Carnival of Souls (1962)", id: "carnivalofsouls", year: 1962 },
    { title: "Nosferatu (1922)", id: "nosferatu", year: 1922 },
    { title: "Metropolis (1927)", id: "Metropolis", year: 1927 },
    { title: "The General (1926)", id: "thegeneral1926", year: 1926 },
    { title: "Safety Last! (1923)", id: "safety_last", year: 1923 },
    { title: "Steamboat Bill, Jr. (1928)", id: "steamboatbilljr", year: 1928 },
    { title: "The Kid (1921)", id: "thekid1921", year: 1921 },
    { title: "Sherlock Jr. (1924)", id: "sherlockjr", year: 1924 },
    { title: "The Cabinet of Dr. Caligari (1920)", id: "caligari", year: 1920 },
    { title: "Charade (1963)", id: "charade", year: 1963 },
    { title: "The Hitch-Hiker (1953)", id: "thehitchhiker", year: 1953 }
];

function init() {
    loading.style.display = "none";
    movieList.innerHTML = "";

    movies.forEach(movie => {
        const card = document.createElement("div");
        card.className = "movie-card";
        card.innerHTML = `
            <h3>${movie.title}</h3>
            <div class="movie-meta">${movie.year}</div>
        `;

        card.addEventListener("click", () => {
            document.querySelectorAll(".movie-card").forEach(c => c.classList.remove("active"));
            card.classList.add("active");
            playMovie(movie.id, movie.title);
        });

        movieList.appendChild(card);
    });

    // Auto-play first movie
    if (movies.length > 0) {
        playMovie(movies[0].id, movies[0].title);
    }
}

function playMovie(id, title) {
    movieTitleEl.textContent = title;
    videoPlayer.src = `https://archive.org/download/${id}/${id}.mp4`;
    videoPlayer.load();
    videoPlayer.play().catch(() => {});
}

// Start
init();
</script>
</body>
</html>
