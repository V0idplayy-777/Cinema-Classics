<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Classics</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #111; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header {
            background-color: #000; padding: 20px; text-align: center; border-bottom: 2px solid #333;
        }
        main { display: flex; flex: 1; overflow: hidden; }
        .player-container {
            flex: 2; background-color: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
        }
        iframe {
            width: 100%; max-width: 100%; height: 85%; border: none; background: #000;
        }
        #movie-title {
            margin-top: 15px; font-size: 1.5rem; color: #e50914; text-align: center;
        }
        .sidebar {
            flex: 1; overflow-y: auto; padding: 20px; background-color: #181818;
        }
        .movie-card {
            background-color: #222; border-radius: 6px; padding: 15px; margin-bottom: 15px;
            cursor: pointer; transition: all 0.2s; border: 1px solid #333;
        }
        .movie-card:hover, .movie-card.active {
            background-color: #333; border-color: #e50914;
        }
    </style>
</head>
<body>

    <header>
        <h1>Cinema Classics</h1>
    </header>

    <main>
        <!-- Player Area -->
        <div class="player-container">
            <iframe id="main-player" 
                    width="560" height="384" 
                    frameborder="0" 
                    allowfullscreen>
            </iframe>
            <h2 id="movie-title">Select a movie from the sidebar</h2>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>Available Movies</h2>
            <div class="movie-card" onclick="playSherlockJr(this)">
                <h3>Sherlock Jr. (1924)</h3>
                <div style="font-size:0.9rem; color:#aaa;">Buster Keaton • Silent Comedy • G</div>
            </div>
        </div>
    </main>

    <script>
        const player = document.getElementById('main-player');
        const titleEl = document.getElementById('movie-title');

        function playSherlockJr(el) {
            // Remove active from all cards
            document.querySelectorAll('.movie-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');

            titleEl.textContent = "Sherlock Jr. (1924)";

            // Try Archive.org first
            const archiveEmbed = "https://archive.org/embed/sherlock.-jr..-1924.1080p.-blu-ray.x-264-yts.-am";
            
            player.src = archiveEmbed;

            // If Archive.org fails (offline), fallback to YouTube after a short delay
            setTimeout(() => {
                if (player.contentWindow.location.href.includes("archive.org") === false || 
                    player.contentWindow.document.body.innerHTML.includes("offline")) {
                    console.log("Archive.org unavailable - switching to YouTube");
                    player.src = "https://www.youtube.com/embed/efydqBb5_Wc";
                }
            }, 3000);
        }
    </script>
</body>
</html>
